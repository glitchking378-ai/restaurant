name: Chef Bot

on:
  workflow_dispatch:
  push:
    paths:
      - 'chef.js'
      - 'Kitchen/**'
      - 'Menu/**'
      - 'scripts/chef-bot.mjs'
      - 'package.json'

jobs:
  chef:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run chef bot
        env:
          CHEF_URL: http://localhost:8787
        run: node scripts/chef-bot.mjs
