name: Chef Bot

on:
  workflow_dispatch:
  push:
    paths:
      - 'chef.js'
      - 'Kitchen/**'
      - 'Menu/**'
      - 'scripts/chef-bot.mjs'
      - 'package.json'

jobs:
  chef:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check chef bot syntax
        run: node --check scripts/chef-bot.mjs

      - name: Check chef worker syntax
        run: |
          node --check chef.js
          node --check Kitchen/chefLogic.js
          node --check Menu/items.js
