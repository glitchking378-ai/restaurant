name: Waiter Bot

on:
  workflow_dispatch:
  push:
    paths:
      - 'waiter.js'
      - 'scripts/waiter-bot.mjs'
      - 'package.json'

jobs:
  waiter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check waiter bot syntax
        run: node --check scripts/waiter-bot.mjs

      - name: Check waiter worker syntax
        run: |
          node --check waiter.js
          node --check Security-Guards/validate.js
          node --check Tables/tableResponse.js
          node --check Billing/bill.js
