name: Food System

on:
  workflow_dispatch:
  push:
    paths:
      - 'waiter.js'
      - 'chef.js'
      - 'scripts/food.mjs'
      - 'package.json'

jobs:
  food:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check food workflow syntax
        run: node --check scripts/food.mjs

      - name: Check app and worker syntax
        run: |
          node --check waiter.js
          node --check chef.js
          node --check public/app.js
