name: Food System

on:
  workflow_dispatch:
  push:
    paths:
      - 'waiter.js'
      - 'chef.js'
      - 'scripts/food.mjs'
      - 'package.json'

jobs:
  food:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run food workflow
        env:
          WAITER_URL: http://localhost:8787
        run: node scripts/food.mjs
