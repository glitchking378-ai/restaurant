name: Order Bot

on:
  workflow_dispatch:
  push:
    paths:
      - 'waiter.js'
      - 'chef.js'
      - 'Menu/**'
      - 'Kitchen/**'
      - 'Billing/**'
      - 'Tables/**'
      - 'Security-Guards/**'
      - 'Reservations/**'
      - 'scripts/order-bot.mjs'
      - 'package.json'

jobs:
  process-order:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run order bot
        env:
          WAITER_URL: http://localhost:8787
        run: node scripts/order-bot.mjs
