name: Order Bot

on:
  workflow_dispatch:
  push:
    paths:
      - 'waiter.js'
      - 'chef.js'
      - 'Menu/**'
      - 'Kitchen/**'
      - 'Billing/**'
      - 'Tables/**'
      - 'Security-Guards/**'
      - 'Reservations/**'
      - 'scripts/order-bot.mjs'
      - 'package.json'

jobs:
  process-order:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check order bot syntax
        run: node --check scripts/order-bot.mjs

      - name: Check worker syntax
        run: |
          node --check waiter.js
          node --check chef.js
          node --check Menu/items.js
          node --check Kitchen/chefLogic.js
          node --check Billing/bill.js
          node --check Tables/tableResponse.js
          node --check Security-Guards/validate.js
          node --check Reservations/reservations.js
